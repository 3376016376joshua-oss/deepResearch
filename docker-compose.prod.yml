# 生产/线上叠加 compose
# 与根目录 docker-compose.yml 联用：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 中间件由根 compose 提供（postgres/redis/milvus/elasticsearch）。
# 本文件追加 backend（FastAPI）与 frontend（nginx 静态站）。

services:
  backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    image: industry_backend:latest
    container_name: industry_backend
    restart: unless-stopped
    env_file:
      # 默认本地用 .env；上线时 export BACKEND_ENV_FILE=./backend/.env.prod 切换
      - ${BACKEND_ENV_FILE:-./backend/.env}
    environment:
      # —— 容器内联通：用 compose service 名覆盖宿主机 localhost ——
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      # —— DashScope-only 模式锁死 ——
      DEEPSCOUT_USE_LOCAL_SFT: "0"
      DEEPSCOUT_WARMUP: "0"
      # —— CORS：默认放开，正式上线改成具体域名 ——
      CORS_ORIGINS: "*"
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/data:/app/data
      - ./backend/app/logs:/app/logs
    networks:
      - industry_network

  frontend:
    image: nginx:1.27-alpine
    container_name: industry_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      # 需先在宿主机执行：cd frontend && npm ci && npm run build
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - industry_network
